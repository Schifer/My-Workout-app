name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: rm -f package-lock.json && npm install
      - run: npm run build
      - run: npm install @capacitor/core@5.5.1 @capacitor/android@5.5.1
      - run: npm install -g @capacitor/cli
      - run: npx cap init WorkoutApp com.schifer.workoutapp --web-dir dist
      - run: npx cap add android
      - run: npx cap sync android
      - run: cd android && ./gradlew --no-daemon assembleDebug
      - run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/WorkoutApp.apk
      - uses: actions/upload-artifact@v4
        with:
          name: WorkoutApp
          path: android/app/build/outputs/apk/debug/WorkoutApp.apk
